<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippo — Archive</title>
  <link rel="icon" href="../ico_clippo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta property="og:title" content="Clippo — Your Clip Archive">
  <meta property="og:description" content="Access your saved YouTube moments with Clippo.">
  <meta property="og:image" content="https://clippo.app/ico_clippo.svg">
  <meta property="og:url" content="https://clippo.app/archive/">
  <script>
    (function() {
      const saved = localStorage.getItem('clippo_theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --brand-500: #7c3aed;
      --brand-600: #6d28d9;
      --font-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
    }

    :root, :root[data-theme="light"] {
      --bg-body: #fafafa;
      --bg-gradient: linear-gradient(135deg, #fafafa 0%, #f5f3ff 100%);
      --card-bg: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.15);
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --shadow-card: 0 8px 32px rgba(0,0,0,0.08);
      --info-bg: rgba(124,58,237,0.08);
      --info-border: rgba(124,58,237,0.2);
      --error-bg: rgba(239,68,68,0.08);
      --error-border: rgba(239,68,68,0.2);
      --success-bg: rgba(34,197,94,0.08);
      --success-border: rgba(34,197,94,0.2);
    }

    html[data-theme="dark"] {
      --bg-body: #0a0a0a;
      --bg-gradient: linear-gradient(135deg, #0a0a0a 0%, #1a0f2e 100%);
      --card-bg: #141414;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.15);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --shadow-card: 0 16px 40px rgba(0,0,0,0.6);
      --info-bg: rgba(124,58,237,0.12);
      --info-border: rgba(124,58,237,0.3);
      --error-bg: rgba(239,68,68,0.12);
      --error-border: rgba(239,68,68,0.3);
      --success-bg: rgba(34,197,94,0.12);
      --success-border: rgba(34,197,94,0.3);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
      padding: 48px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .logo {
      display: block;
      height: 28px;
      width: auto;
      margin: 0 auto 32px;
      animation: logo-shimmer 3s ease-in-out infinite;
    }

    @keyframes logo-shimmer {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.15) saturate(1.2); }
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .status {
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .status.loading { background: var(--info-bg); border: 1px solid var(--info-border); color: var(--brand-500); }
    .status.success { background: var(--success-bg); border: 1px solid var(--success-border); color: #22c55e; }
    .status.error { background: var(--error-bg); border: 1px solid var(--error-border); color: #ef4444; }
    .status.info { background: var(--info-bg); border: 1px solid var(--info-border); color: var(--brand-500); }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-radius: 50%;
      border-top-color: var(--brand-500);
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: inline-block;
      padding: 13px 28px;
      border-radius: 10px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--brand-500);
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    }

    .btn-primary:hover {
      background: var(--brand-600);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    }

    .btn-secondary {
      background: var(--card-bg);
      color: var(--text-secondary);
      border: 1px solid var(--border-strong);
    }

    .btn-secondary:hover {
      border-color: var(--brand-500);
      color: var(--brand-500);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .user-info {
      background: var(--info-bg);
      padding: 10px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--text-secondary);
      display: inline-block;
    }

    .user-info strong { color: var(--text-primary); font-weight: 600; }
    .hidden { display: none !important; }

    .footer-links {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      margin: 0 12px;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: var(--brand-500); }

    .extension-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
    }

    p.desc {
      margin: 16px 0 24px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="../clippo_logo.svg" alt="Clippo"/>
    <h1>Clip Archive</h1>
    <p class="subtitle">Access your saved video moments</p>

    <div id="content">
      <div class="status loading">
        <span class="spinner"></span>
        Loading...
      </div>
    </div>

    <div class="footer-links">
      <a href="/">Home</a>
      <a href="../auth/">Account</a>
    </div>
  </div>

  <script>
    const EXTENSION_ID = 'dffdbdjjppbfkejaaeeglflebiepofed';
    const content = document.getElementById('content');

    function showNotLoggedIn() {
      content.innerHTML = `
        <div class="status error">You need to login to access your clips</div>
        <div class="buttons">
          <a href="../auth/" class="btn btn-primary">Login / Sign Up</a>
          <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>
      `;
    }

    function showExtensionNotFound(email) {
      content.innerHTML = `
        <div class="user-info">Logged in as: <strong>${email}</strong></div>
        <img class="extension-icon" src="../ico_clippo.svg" alt=""/>
        <div class="status info">Clippo extension not detected</div>
        <p class="desc">Install the Chrome extension to access your clip archive</p>
        <div class="buttons">
          <a href="https://chromewebstore.google.com/detail/clippo/dffdbdjjppbfkejaaeeglflebiepofed" target="_blank" class="btn btn-primary">Get Chrome Extension</a>
          <button class="btn btn-secondary" onclick="tryConnect()">Retry Connection</button>
        </div>
      `;
    }

    function showConnecting(email) {
      content.innerHTML = `
        <div class="user-info">Logged in as: <strong>${email}</strong></div>
        <div class="status loading">
          <span class="spinner"></span>
          Connecting to extension...
        </div>
      `;
    }

    function showSuccess(email) {
      content.innerHTML = `
        <div class="user-info">Logged in as: <strong>${email}</strong></div>
        <div class="status success">Extension connected! Opening your archive...</div>
      `;
    }

    function tryConnect() {
      const userId = localStorage.getItem('clippo_user_id');
      const userEmail = localStorage.getItem('clippo_user_email') || 'User';

      if (!userId) {
        showNotLoggedIn();
        return;
      }

      showConnecting(userEmail);

      if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
        try {
          chrome.runtime.sendMessage(
            EXTENSION_ID,
            { action: 'openArchive', userId: userId, userEmail: userEmail },
            response => {
              if (chrome.runtime.lastError) {
                showExtensionNotFound(userEmail);
              } else if (response && response.success) {
                showSuccess(userEmail);
              } else {
                showExtensionNotFound(userEmail);
              }
            }
          );

          setTimeout(() => {
            if (content.innerHTML.includes('Connecting')) {
              showExtensionNotFound(userEmail);
            }
          }, 3000);

        } catch (e) {
          showExtensionNotFound(userEmail);
        }
      } else {
        showExtensionNotFound(userEmail);
      }
    }

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const uid = urlParams.get('uid');
      if (uid) localStorage.setItem('clippo_user_id', uid);

      const userId = localStorage.getItem('clippo_user_id');

      if (userId) {
        tryConnect();
      } else {
        try {
          const SUPABASE_URL = 'https://phnfwoqyyqnqmmteygnb.supabase.co';
          const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobmZ3b3F5eXFucW1tdGV5Z25iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY4NTQwNjQsImV4cCI6MjA4MjQzMDA2NH0.j_9AV-MeZXhRdlrn-O9mMdvgvokSXexUnKIS2r9mljc';

          if (window.supabase) {
            const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const { data: { session } } = await sb.auth.getSession();

            if (session?.user) {
              localStorage.setItem('clippo_user_id', session.user.id);
              localStorage.setItem('clippo_user_email', session.user.email);
              tryConnect();
              return;
            }
          }
        } catch (e) {}

        showNotLoggedIn();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
