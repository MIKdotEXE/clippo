<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippo — Watch Clip</title>
  <link rel="icon" href="../ico_clippo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0f2e 50%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 28px 0 20px;
    }

    .player-header img {
      height: 32px;
      width: auto;
      animation: logo-shimmer 3s ease-in-out infinite;
    }

    @keyframes logo-shimmer {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2) saturate(1.2); }
    }

    .video-section {
      width: 100%;
      max-width: 900px;
      padding: 0 20px;
    }

    .video-frame {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(124, 58, 237, 0.3),
        0 0 80px rgba(124, 58, 237, 0.15);
    }

    .video-frame #player {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }

    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 7px 14px;
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.35);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.5px;
      font-family: 'Plus Jakarta Sans', monospace;
    }

    .time-badge svg {
      width: 13px;
      height: 13px;
    }

    .branding {
      text-align: center;
      padding: 32px 20px 48px;
      max-width: 540px;
    }

    .branding-tagline {
      font-size: 17px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .branding-tagline strong {
      color: #a78bfa;
    }

    .branding-description {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .branding-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 26px;
      border-radius: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-cta svg {
      width: 16px;
      height: 16px;
    }

    #rewatch-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-radius: 16px;
    }

    #rewatch-overlay.show { display: flex; }

    #rewatch-overlay p {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    .btn-rewatch {
      padding: 13px 30px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
    }

    .btn-rewatch:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.55);
    }
  </style>
</head>
<body>
  <div class="player-header">
    <img src="../clippo_logo.svg" alt="Clippo">
  </div>

  <div class="video-section">
    <div class="video-frame">
      <div id="player"></div>
      <div id="rewatch-overlay">
        <p>Clip ended</p>
        <button class="btn-rewatch" id="rewatch-btn">Watch Again</button>
      </div>
    </div>
    <div style="text-align: center;">
      <span class="time-badge" id="time-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span id="time-range"></span>
      </span>
    </div>
  </div>

  <div class="branding">
    <p class="branding-tagline">Clip saved with <strong>Clippo</strong></p>
    <p class="branding-description">Save your favorite YouTube moments, organize them, and share with anyone.</p>
    <div class="branding-actions">
      <a href="https://chromewebstore.google.com/detail/clippo/dffdbdjjppbfkejaaeeglflebiepofed" target="_blank" class="btn-cta btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/><line x1="10.88" y1="21.94" x2="15.46" y2="14"/></svg>
        Get Clippo — It's Free
      </a>
      <a href="https://clippo.app" target="_blank" class="btn-cta btn-secondary">
        Learn More
      </a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('v');
    const startTime = parseInt(params.get('start')) || 0;
    const endTime = parseInt(params.get('end')) || 0;
    const clipId = params.get('clipId') || '';

    let player = null;
    let checkInterval = null;
    const rewatchOverlay = document.getElementById('rewatch-overlay');

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return m + ':' + String(sec).padStart(2, '0');
    }

    const timeRange = document.getElementById('time-range');
    if (endTime > startTime) {
      timeRange.textContent = `${formatTime(startTime)} — ${formatTime(endTime)}`;
    } else {
      timeRange.textContent = `From ${formatTime(startTime)}`;
    }

    function showEndOverlay() {
      rewatchOverlay.classList.add('show');
      try { window.parent.postMessage({ type: 'videoEnded', clipId: clipId }, '*'); } catch(e){}
    }

    function startMonitoring() {
      if (endTime > startTime) {
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(() => {
          if (player && player.getCurrentTime) {
            if (player.getCurrentTime() >= endTime) {
              player.pauseVideo();
              clearInterval(checkInterval);
              showEndOverlay();
            }
          }
        }, 250);
      }
    }

    function onYouTubeIframeAPIReady() {
      if (player && player.destroy) { player.destroy(); player = null; }
      document.getElementById('player').innerHTML = '';

      player = new YT.Player('player', {
        videoId: videoId,
        playerVars: { autoplay: 1, start: startTime, controls: 1, modestbranding: 1, rel: 0, fs: 1 },
        events: {
          'onReady': (e) => { e.target.playVideo(); startMonitoring(); },
          'onStateChange': (e) => {
            if (e.data === YT.PlayerState.ENDED) showEndOverlay();
          }
        }
      });
    }

    document.getElementById('rewatch-btn').addEventListener('click', () => {
      rewatchOverlay.classList.remove('show');
      if (player && player.seekTo) {
        player.seekTo(startTime, true);
        player.playVideo();
        startMonitoring();
      }
    });

    if (window.YT && window.YT.Player) {
      onYouTubeIframeAPIReady();
    } else {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    window.addEventListener('beforeunload', () => {
      if (checkInterval) clearInterval(checkInterval);
      if (player && player.destroy) player.destroy();
    });
  </script>
</body>
</html>
