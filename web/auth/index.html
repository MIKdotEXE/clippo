<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippo - Login</title>
  <link rel="icon" href="https://phnfwoqyyqnqmmteygnb.supabase.co/storage/v1/object/public/assets/icon_48.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --brand-primary: #ed1c24;
      --brand-dark: #c41920;
      --bg-white: #ffffff;
      --bg-light: #fafafa;
      --border-light: rgba(237, 28, 36, 0.12);
      --border-medium: rgba(237, 28, 36, 0.25);
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #7a7a7a;
      --text-on-brand: #ffffff;
      --accent-danger: #ed1c24;
      --accent-success: #27ae60;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zain', sans-serif;
      background: linear-gradient(135deg, var(--bg-light) 0%, #fff5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }

    .auth-container {
      background: var(--bg-white);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(237, 28, 36, 0.12);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border-light);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .logo-icon svg {
      width: 36px;
      height: 36px;
      fill: var(--text-on-brand);
    }

    .logo-section h1 {
      font-family: 'Zain', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--brand-dark);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo-section p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border-medium);
      background: var(--bg-light);
      border-radius: 8px;
      font-family: 'Zain', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
      border-color: var(--brand-primary);
      color: var(--text-on-brand);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-family: 'Zain', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-light);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-family: 'Zain', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(237, 28, 36, 0.12);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
      border: none;
      border-radius: 8px;
      font-family: 'Zain', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-on-brand);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(237, 28, 36, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .message.error {
      display: block;
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: var(--accent-danger);
    }

    .message.success {
      display: block;
      background: rgba(39, 174, 96, 0.1);
      border: 1px solid rgba(39, 174, 96, 0.3);
      color: var(--accent-success);
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer-text a {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    #signup-form { display: none; }
    #reset-form { display: none; }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      margin-top: -12px;
      margin-bottom: 16px;
    }

    .forgot-link a {
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
    }

    .forgot-link a:hover {
      color: var(--brand-primary);
      text-decoration: underline;
    }

    .back-to-login {
      display: block;
      text-align: center;
      font-size: 13px;
      margin-top: 16px;
    }

    .back-to-login a {
      color: var(--brand-primary);
      text-decoration: none;
      cursor: pointer;
    }

    .back-to-login a:hover {
      text-decoration: underline;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .debug-info {
      margin-top: 20px;
      padding: 12px;
      background: #f0f0f0;
      border-radius: 8px;
      font-size: 11px;
      font-family: monospace;
      color: #666;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      <h1>Clippo</h1>
      <p>Save and organize your video clips</p>
    </div>

    <button class="submit-btn" id="google-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--bg-white); color: var(--text-primary); border: 1px solid var(--border-medium); margin-bottom: 20px;">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div style="display: flex; align-items: center; margin-bottom: 20px; gap: 10px;">
      <div style="flex: 1; height: 1px; background: var(--border-medium);"></div>
      <span style="font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted);">or</span>
      <div style="flex: 1; height: 1px; background: var(--border-medium);"></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="login-tab">Login</button>
      <button class="tab-btn" id="signup-tab">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
      </div>
      <div class="forgot-link"><a id="forgot-link">Forgot password?</a></div>
      <button type="submit" class="submit-btn" id="login-btn">Login</button>
      <div class="message" id="login-message"></div>
    </form>

    <!-- Reset Password Form -->
    <form id="reset-form">
      <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 20px;">
        Enter your email and we'll send you a link to reset your password.
      </p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reset-email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="submit-btn" id="reset-btn">Send Reset Link</button>
      <div class="message" id="reset-message"></div>
      <div class="back-to-login"><a id="back-to-login">Back to Login</a></div>
    </form>

    <!-- Signup Form -->
    <form id="signup-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Create a password (min 6 chars)" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
      </div>
      <button type="submit" class="submit-btn" id="signup-btn">Create Account</button>
      <div class="message" id="signup-message"></div>
    </form>

    <div class="footer-text">
      <a href="/">Back to Home</a> | <a href="../archive/">Go to Archive</a>
    </div>

    <div class="debug-info" id="debug-info"></div>
  </div>

  <script>
    // Supabase credentials
    const SUPABASE_URL = 'https://phnfwoqyyqnqmmteygnb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobmZ3b3F5eXFucW1tdGV5Z25iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY4NTQwNjQsImV4cCI6MjA4MjQzMDA2NH0.j_9AV-MeZXhRdlrn-O9mMdvgvokSXexUnKIS2r9mljc';

    let supabaseClient;

    // Initialize Supabase
    function initSupabase() {
      if (window.supabase && window.supabase.createClient) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase initialized');
        return true;
      }
      console.error('Supabase not loaded');
      return false;
    }

    // DOM Elements
    const loginTab = document.getElementById('login-tab');
    const signupTab = document.getElementById('signup-tab');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const loginBtn = document.getElementById('login-btn');
    const signupBtn = document.getElementById('signup-btn');
    const loginMessage = document.getElementById('login-message');
    const signupMessage = document.getElementById('signup-message');

    // Tab switching
    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.style.display = 'block';
      signupForm.style.display = 'none';
      clearMessages();
    });

    signupTab.addEventListener('click', () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.style.display = 'block';
      loginForm.style.display = 'none';
      clearMessages();
    });

    function clearMessages() {
      loginMessage.className = 'message';
      loginMessage.textContent = '';
      signupMessage.className = 'message';
      signupMessage.textContent = '';
    }

    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = `message ${type}`;
    }

    function setLoading(button, loading) {
      if (loading) {
        button.disabled = true;
        button.innerHTML = '<span class="loading-spinner"></span>Please wait...';
      } else {
        button.disabled = false;
        button.textContent = button.id === 'login-btn' ? 'Login' : 'Create Account';
      }
    }

    // Handle successful authentication
    function handleAuthSuccess(user) {
      console.log('Auth success:', user.id, user.email);
      localStorage.setItem('clippo_user_id', user.id);
      localStorage.setItem('clippo_user_email', user.email);
      window.location.href = '../archive/';
    }

    // Check if user is already logged in
    async function checkSession() {
      if (!supabaseClient) return;

      try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        console.log('Session check:', session ? 'Found' : 'None', error || '');

        if (session?.user) {
          handleAuthSuccess(session.user);
        }
      } catch (e) {
        console.error('Session check error:', e);
      }
    }

    // Login with email/password
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      if (!supabaseClient) {
        showMessage(loginMessage, 'Authentication service not available', 'error');
        return;
      }

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showMessage(loginMessage, 'Please fill in all fields', 'error');
        return;
      }

      setLoading(loginBtn, true);

      try {
        console.log('Attempting login for:', email);
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          console.error('Login error:', error);
          throw error;
        }

        console.log('Login success:', data.user.id);
        showMessage(loginMessage, 'Login successful! Redirecting...', 'success');
        handleAuthSuccess(data.user);

      } catch (error) {
        console.error('Login failed:', error);
        showMessage(loginMessage, error.message || 'Login failed', 'error');
      } finally {
        setLoading(loginBtn, false);
      }
    });

    // Sign up with email/password
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      if (!supabaseClient) {
        showMessage(signupMessage, 'Authentication service not available', 'error');
        return;
      }

      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;

      if (!email || !password || !confirm) {
        showMessage(signupMessage, 'Please fill in all fields', 'error');
        return;
      }

      if (password !== confirm) {
        showMessage(signupMessage, 'Passwords do not match', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage(signupMessage, 'Password must be at least 6 characters', 'error');
        return;
      }

      setLoading(signupBtn, true);

      try {
        console.log('Attempting signup for:', email);
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password
        });

        if (error) {
          console.error('Signup error:', error);
          throw error;
        }

        console.log('Signup response:', data);

        if (data.user && !data.session) {
          showMessage(signupMessage, 'Check your email for the confirmation link!', 'success');
        } else if (data.session) {
          showMessage(signupMessage, 'Account created! Redirecting...', 'success');
          handleAuthSuccess(data.user);
        }

      } catch (error) {
        console.error('Signup failed:', error);
        showMessage(signupMessage, error.message || 'Signup failed', 'error');
      } finally {
        setLoading(signupBtn, false);
      }
    });

    // Google OAuth
    document.getElementById('google-btn').addEventListener('click', async () => {
      if (!supabaseClient) {
        showMessage(loginMessage, 'Authentication service not available', 'error');
        return;
      }

      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/auth/'
          }
        });
        if (error) throw error;
      } catch (error) {
        showMessage(loginMessage, error.message || 'Google login failed', 'error');
      }
    });

    // Auto-trigger Google login if coming from extension (?google=1)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('google') === '1') {
      // Wait for Supabase to initialize, then trigger Google OAuth
      const googleAutoLogin = setInterval(() => {
        if (supabaseClient) {
          clearInterval(googleAutoLogin);
          document.getElementById('google-btn').click();
        }
      }, 100);
      setTimeout(() => clearInterval(googleAutoLogin), 5000);
    }

    // Forgot password link
    const resetForm = document.getElementById('reset-form');
    const resetBtn = document.getElementById('reset-btn');
    const resetMessage = document.getElementById('reset-message');

    document.getElementById('forgot-link').addEventListener('click', () => {
      loginForm.style.display = 'none';
      signupForm.style.display = 'none';
      resetForm.style.display = 'block';
      document.querySelector('.tabs').style.display = 'none';
      clearMessages();
      resetMessage.className = 'message';
      resetMessage.textContent = '';
    });

    document.getElementById('back-to-login').addEventListener('click', () => {
      resetForm.style.display = 'none';
      loginForm.style.display = 'block';
      document.querySelector('.tabs').style.display = 'flex';
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      clearMessages();
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetMessage.className = 'message';
      resetMessage.textContent = '';

      if (!supabaseClient) {
        showMessage(resetMessage, 'Authentication service not available', 'error');
        return;
      }

      const email = document.getElementById('reset-email').value.trim();
      if (!email) {
        showMessage(resetMessage, 'Please enter your email', 'error');
        return;
      }

      setLoading(resetBtn, true);
      resetBtn.textContent = 'Send Reset Link';

      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/auth/'
        });

        if (error) throw error;

        showMessage(resetMessage, 'Reset link sent! Check your email.', 'success');
      } catch (error) {
        showMessage(resetMessage, error.message || 'Failed to send reset link', 'error');
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Send Reset Link';
      }
    });

    // Handle password reset from email link (user arrives with access_token in URL hash)
    async function handlePasswordReset() {
      const hash = window.location.hash;
      if (!hash || !hash.includes('type=recovery')) return;

      // Wait for Supabase to process the token
      if (!supabaseClient) return;

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return;

      const newPassword = prompt('Enter your new password (min 6 characters):');
      if (!newPassword || newPassword.length < 6) {
        alert('Password must be at least 6 characters.');
        return;
      }

      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
        if (error) throw error;
        alert('Password updated successfully!');
        window.location.href = '/auth/';
      } catch (error) {
        alert('Error updating password: ' + error.message);
      }
    }

    // Initialize on page load
    function init() {
      console.log('Initializing auth page...');

      if (initSupabase()) {
        handlePasswordReset();
        checkSession();
      } else {
        // Retry after a short delay
        setTimeout(() => {
          if (initSupabase()) {
            handlePasswordReset();
            checkSession();
          } else {
            showMessage(loginMessage, 'Failed to load authentication service. Please refresh.', 'error');
          }
        }, 1000);
      }
    }

    // Start
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
