<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippo - Login</title>
  <link rel="icon" href="../ico_clippo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    (function() {
      const saved = localStorage.getItem('clippo_theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --brand-primary: #7c3aed;
      --brand-dark: #6d28d9;
      --accent-danger: #ef4444;
      --accent-success: #22c55e;
    }

    :root, :root[data-theme="light"] {
      --bg-white: #ffffff;
      --bg-light: #fafafa;
      --bg-gradient: linear-gradient(135deg, #fafafa 0%, #f5f3ff 100%);
      --border-light: rgba(0, 0, 0, 0.08);
      --border-medium: rgba(0, 0, 0, 0.15);
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --text-on-brand: #ffffff;
      --shadow-card: 0 8px 32px rgba(0,0,0,0.08);
      --input-bg: #fafafa;
    }

    :root[data-theme="dark"] {
      --bg-white: #141414;
      --bg-light: #0a0a0a;
      --bg-gradient: linear-gradient(135deg, #0a0a0a 0%, #1a0f2e 100%);
      --border-light: rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.15);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --text-on-brand: #ffffff;
      --shadow-card: 0 16px 40px rgba(0,0,0,0.6);
      --input-bg: #1c1c1c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }

    .auth-container {
      background: var(--bg-white);
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border-light);
      position: relative;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      padding: 0;
      background: var(--bg-white);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      z-index: 100;
    }

    .theme-toggle:hover {
      border-color: var(--border-medium);
      color: var(--text-primary);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }

    .theme-toggle .icon-moon { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-full {
      width: auto;
      height: 26px;
      display: block;
      margin: 0 auto 16px;
      animation: logo-shimmer 3s ease-in-out infinite;
    }

    @keyframes logo-shimmer {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.15) saturate(1.2); }
    }

    .logo-section p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border-medium);
      background: var(--input-bg);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
      border-color: var(--brand-primary);
      color: var(--text-on-brand);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
      border: none;
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-on-brand);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .message.error {
      display: block;
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: var(--accent-danger);
    }

    .message.success {
      display: block;
      background: rgba(39, 174, 96, 0.1);
      border: 1px solid rgba(39, 174, 96, 0.3);
      color: var(--accent-success);
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer-text a {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    #signup-form { display: none; }
    #reset-form { display: none; }

    .pw-field {
      position: relative;
    }
    .pw-field input {
      width: 100%;
      padding-right: 40px;
    }
    .pw-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .pw-toggle:hover { opacity: 1; }
    .pw-toggle .eye-hide { display: none; }
    .pw-toggle.showing .eye-show { display: none; }
    .pw-toggle.showing .eye-hide { display: block; }

    .oauth-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .oauth-btn {
      flex: 1;
      padding: 11px 8px;
      background: var(--bg-white);
      border: 1px solid var(--border-medium);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .oauth-btn:hover {
      border-color: var(--brand-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .oauth-btn svg {
      flex-shrink: 0;
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      margin-top: -12px;
      margin-bottom: 16px;
    }

    .forgot-link a {
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
    }

    .forgot-link a:hover {
      color: var(--brand-primary);
      text-decoration: underline;
    }

    .back-to-login {
      display: block;
      text-align: center;
      font-size: 13px;
      margin-top: 16px;
    }

    .back-to-login a {
      color: var(--brand-primary);
      text-decoration: none;
      cursor: pointer;
    }

    .back-to-login a:hover {
      text-decoration: underline;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .debug-info {
      margin-top: 20px;
      padding: 12px;
      background: #f0f0f0;
      border-radius: 8px;
      font-size: 11px;
      font-family: monospace;
      color: #666;
      display: none;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>

        Discord

    <div style="display: flex; align-items: center; margin-bottom: 20px; gap: 10px;">
      <div style="flex: 1; height: 1px; background: var(--border-medium);"></div>
      <span style="font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted);">or</span>

  <script>
    // Theme toggle
    document.getElementById('themeToggle')?.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('clippo_theme', next);
    });

    // Password visibility toggles
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.classList.toggle('showing', isPassword);
      });
    });

    // Supabase credentials
    const SUPABASE_URL = 'https://phnfwoqyyqnqmmteygnb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobmZ3b3F5eXFucW1tdGV5Z25iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY4NTQwNjQsImV4cCI6MjA4MjQzMDA2NH0.j_9AV-MeZXhRdlrn-O9mMdvgvokSXexUnKIS2r9mljc';

    let supabaseClient;

    // Initialize Supabase
    function initSupabase() {
      if (window.supabase && window.supabase.createClient) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase initialized');
        return true;
      }
      console.error('Supabase not loaded');
      return false;
    }

    // DOM Elements
    const loginTab = document.getElementById('login-tab');
    const signupTab = document.getElementById('signup-tab');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const loginBtn = document.getElementById('login-btn');
    const signupBtn = document.getElementById('signup-btn');
    const loginMessage = document.getElementById('login-message');
    const signupMessage = document.getElementById('signup-message');

    // Tab switching
    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.style.display = 'block';
      signupForm.style.display = 'none';
      clearMessages();
    });

    signupTab.addEventListener('click', () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.style.display = 'block';
      loginForm.style.display = 'none';
      clearMessages();
    });

    function clearMessages() {
      loginMessage.className = 'message';
      loginMessage.textContent = '';
      signupMessage.className = 'message';
      signupMessage.textContent = '';
    }

    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = `message ${type}`;
    }

    function setLoading(button, loading) {
      if (loading) {
        button.disabled = true;
        button.innerHTML = '<span class="loading-spinner"></span>Please wait...';
      } else {
        button.disabled = false;
        button.textContent = button.id === 'login-btn' ? 'Login' : 'Create Account';
      }
    }

    // Handle successful authentication
    function handleAuthSuccess(user) {
      console.log('Auth success:', user.id, user.email);
      localStorage.setItem('clippo_user_id', user.id);
      localStorage.setItem('clippo_user_email', user.email);
      window.location.href = '../archive/';
    }

    // Check if user is already logged in
    async function checkSession() {
      if (!supabaseClient) return;

      try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        console.log('Session check:', session ? 'Found' : 'None', error || '');

        if (session?.user) {
          handleAuthSuccess(session.user);
        }
      } catch (e) {
        console.error('Session check error:', e);
      }
    }

    // Login with email/password
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      if (!supabaseClient) {
        showMessage(loginMessage, 'Authentication service not available', 'error');
        return;
      }

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showMessage(loginMessage, 'Please fill in all fields', 'error');
        return;
      }

      setLoading(loginBtn, true);

      try {
        console.log('Attempting login for:', email);
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          console.error('Login error:', error);
          throw error;
        }

        console.log('Login success:', data.user.id);
        showMessage(loginMessage, 'Login successful! Redirecting...', 'success');
        handleAuthSuccess(data.user);

      } catch (error) {
        console.error('Login failed:', error);
        showMessage(loginMessage, error.message || 'Login failed', 'error');
      } finally {
        setLoading(loginBtn, false);
      }
    });

    // Sign up with email/password
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      if (!supabaseClient) {
        showMessage(signupMessage, 'Authentication service not available', 'error');
        return;
      }

      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;

      if (!email || !password || !confirm) {
        showMessage(signupMessage, 'Please fill in all fields', 'error');
        return;
      }

      if (password !== confirm) {
        showMessage(signupMessage, 'Passwords do not match', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage(signupMessage, 'Password must be at least 6 characters', 'error');
        return;
      }

      setLoading(signupBtn, true);

      try {
        console.log('Attempting signup for:', email);
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password
        });

        if (error) {
          console.error('Signup error:', error);
          throw error;
        }

        console.log('Signup response:', data);

        if (data.user && !data.session) {
          showMessage(signupMessage, 'Check your email for the confirmation link!', 'success');
        } else if (data.session) {
          showMessage(signupMessage, 'Account created! Redirecting...', 'success');
          handleAuthSuccess(data.user);
        }

      } catch (error) {
        console.error('Signup failed:', error);
        showMessage(signupMessage, error.message || 'Signup failed', 'error');
      } finally {
        setLoading(signupBtn, false);
      }
    });

    // Google OAuth
    document.getElementById('google-btn').addEventListener('click', async () => {
      if (!supabaseClient) {
        showMessage(loginMessage, 'Authentication service not available', 'error');
        return;
      }

      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/auth/'
          }
        });
        if (error) throw error;
      } catch (error) {
        showMessage(loginMessage, error.message || 'Google login failed', 'error');
      }
    });

    // GitHub OAuth
    document.getElementById('github-btn').addEventListener('click', async () => {
      if (!supabaseClient) { showMessage(loginMessage, 'Authentication service not available', 'error'); return; }
      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'github', options: { redirectTo: window.location.origin + '/auth/' } });
        if (error) throw error;
      } catch (error) { showMessage(loginMessage, error.message || 'GitHub login failed', 'error'); }
    });

    // Discord OAuth
    document.getElementById('discord-btn').addEventListener('click', async () => {
      if (!supabaseClient) { showMessage(loginMessage, 'Authentication service not available', 'error'); return; }
      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: window.location.origin + '/auth/' } });
        if (error) throw error;
      } catch (error) { showMessage(loginMessage, error.message || 'Discord login failed', 'error'); }
    });

    // Auto-trigger OAuth login if coming from extension (?google=1, ?github=1, ?discord=1)
    const urlParams = new URLSearchParams(window.location.search);
    ['google', 'github', 'discord'].forEach(provider => {
      if (urlParams.get(provider) === '1') {
        const autoLogin = setInterval(() => {
          if (supabaseClient) {
            clearInterval(autoLogin);
            document.getElementById(`${provider}-btn`).click();
          }
        }, 100);
        setTimeout(() => clearInterval(autoLogin), 5000);
      }
    });

    // Forgot password link
    const resetForm = document.getElementById('reset-form');
    const resetBtn = document.getElementById('reset-btn');
    const resetMessage = document.getElementById('reset-message');

    document.getElementById('forgot-link').addEventListener('click', () => {
      loginForm.style.display = 'none';
      signupForm.style.display = 'none';
      resetForm.style.display = 'block';
      document.querySelector('.tabs').style.display = 'none';
      clearMessages();
      resetMessage.className = 'message';
      resetMessage.textContent = '';
    });

    document.getElementById('back-to-login').addEventListener('click', () => {
      resetForm.style.display = 'none';
      loginForm.style.display = 'block';
      document.querySelector('.tabs').style.display = 'flex';
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      clearMessages();
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetMessage.className = 'message';
      resetMessage.textContent = '';

      if (!supabaseClient) {
        showMessage(resetMessage, 'Authentication service not available', 'error');
        return;
      }

      const email = document.getElementById('reset-email').value.trim();
      if (!email) {
        showMessage(resetMessage, 'Please enter your email', 'error');
        return;
      }

      setLoading(resetBtn, true);
      resetBtn.textContent = 'Send Reset Link';

      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/auth/reset/'
        });

        if (error) throw error;

        showMessage(resetMessage, 'Reset link sent! Check your email.', 'success');
      } catch (error) {
        showMessage(resetMessage, error.message || 'Failed to send reset link', 'error');
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Send Reset Link';
      }
    });

    // Handle password reset from email link (user arrives with access_token in URL hash)
    async function handlePasswordReset() {
      const hash = window.location.hash;

      // If recovery token in hash, redirect to dedicated reset page
      if (hash && hash.includes('type=recovery')) {
        window.location.href = '/auth/reset/' + hash;
        return true; // signal to skip checkSession
      }

      // If error in hash (expired link etc), show message
      if (hash && hash.includes('error=')) {
        const params = new URLSearchParams(hash.substring(1));
        const errorDesc = params.get('error_description') || 'An error occurred';
        showMessage(loginMessage, errorDesc.replace(/\+/g, ' '), 'error');
        window.location.hash = '';
        return true;
      }

      return false;
    }

    // Initialize on page load
    async function init() {
      console.log('Initializing auth page...');

      if (initSupabase()) {
        const isRecovery = await handlePasswordReset();
        if (!isRecovery) checkSession();
      } else {
        // Retry after a short delay
        setTimeout(async () => {
          if (initSupabase()) {
            const isRecovery = await handlePasswordReset();
            if (!isRecovery) checkSession();
          } else {
            showMessage(loginMessage, 'Failed to load authentication service. Please refresh.', 'error');
          }
        }, 1000);
      }
    }

    // Start
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
