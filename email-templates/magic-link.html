<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Clippo magic link</title>
</head>
<body style="margin:0;padding:0;background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#fafafa;padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="480" style="max-width:480px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.06);">
          <tr>
            <td style="background:linear-gradient(135deg,#7c3aed 0%,#6d28d9 100%);padding:40px 40px 32px;text-align:center;">
              <img src="https://clippo.app/ico_clippo.svg" alt="Clippo" width="56" height="56" style="display:block;width:56px;height:56px;margin:0 auto 16px;border-radius:12px;background:#ffffff;padding:8px;box-sizing:border-box;"/>
              <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:800;letter-spacing:1px;">CLIPPO</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:40px;">
              <h2 style="margin:0 0 16px;color:#18181b;font-size:22px;font-weight:800;letter-spacing:-0.02em;">
                Your magic link is here ✨
              </h2>
              <p style="margin:0 0 24px;color:#52525b;font-size:15px;line-height:1.6;">
                Click the button below to sign in to Clippo. No password needed.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;background:#7c3aed;color:#ffffff;font-size:14px;font-weight:700;text-decoration:none;border-radius:10px;letter-spacing:0.3px;">
                      Sign in to Clippo
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:32px 0 0;color:#a1a1aa;font-size:13px;line-height:1.6;text-align:center;">
                Or copy and paste this link:<br>
                <a href="{{ .ConfirmationURL }}" style="color:#7c3aed;word-break:break-all;">{{ .ConfirmationURL }}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 40px;border-top:1px solid #e4e4e7;text-align:center;">
              <p style="margin:0;color:#a1a1aa;font-size:12px;line-height:1.6;">
                If you didn't request this link, you can safely ignore this email.
              </p>
              <p style="margin:12px 0 0;color:#a1a1aa;font-size:11px;">
                © 2025 Clippo · <a href="https://clippo.app" style="color:#7c3aed;text-decoration:none;">clippo.app</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
