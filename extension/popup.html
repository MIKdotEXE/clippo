<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippo</title>
  <link rel="icon" href="ico_clippo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="theme-loader.js"></script>
  <style>
    :root {
      --brand-primary: #7c3aed;
      --brand-dark: #6d28d9;
      --accent-danger: #ef4444;
      --accent-success: #22c55e;
    }

    :root {
      --bg-white: #ffffff;
      --bg-light: #fafafa;
      --bg-gradient: linear-gradient(135deg, #fafafa 0%, #f5f3ff 100%);
      --border-light: rgba(0, 0, 0, 0.08);
      --border-medium: rgba(0, 0, 0, 0.15);
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --text-on-brand: #ffffff;
      --shadow-card: 0 8px 32px rgba(0,0,0,0.08);
      --input-bg: #fafafa;
    }

    html[data-theme="dark"] {
      --bg-white: #141414;
      --bg-light: #0a0a0a;
      --bg-gradient: linear-gradient(135deg, #0a0a0a 0%, #1a0f2e 100%);
      --border-light: rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.15);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --shadow-card: 0 16px 40px rgba(0,0,0,0.6);
      --input-bg: #1c1c1c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-container {
      background: var(--bg-white);
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border-light);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      padding: 0;
      background: var(--bg-white);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      z-index: 100;
    }

    .theme-toggle:hover {
      border-color: var(--border-medium);
      color: var(--text-primary);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }

    .theme-toggle .icon-moon { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

    /* Logo */
    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-full {
      width: auto;
      height: 26px;
      display: block;
      margin: 0 auto;
      animation: logo-shimmer 3s ease-in-out infinite;
    }

    @keyframes logo-shimmer {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.15) saturate(1.2); }
    }

    .logo-section h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--brand-dark);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo-section p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 8px;
    }

    /* Google button */
    .google-btn {
      width: 100%;
      padding: 12px;
      background: var(--bg-white);
      border: 1px solid var(--border-medium);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .google-btn:hover {
      border-color: var(--brand-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .google-btn svg { width: 18px; height: 18px; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 16px 0;
      gap: 10px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-medium);
    }

    .divider span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border-medium);
      background: var(--input-bg);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
      border-color: var(--brand-primary);
      color: var(--text-on-brand);
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    .form-group input::placeholder { color: var(--text-muted); }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
      border: none;
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-on-brand);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .message.error {
      display: block;
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: var(--accent-danger);
    }

    .message.success {
      display: block;
      background: rgba(39, 174, 96, 0.1);
      border: 1px solid rgba(39, 174, 96, 0.3);
      color: var(--accent-success);
    }

    #signup-form { display: none; }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      margin-top: -16px;
      margin-bottom: 16px;
    }

    .forgot-link a {
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
    }

    .forgot-link a:hover {
      color: var(--brand-primary);
      text-decoration: underline;
    }

    #reset-form { display: none; }

    .back-to-login {
      display: block;
      text-align: center;
      font-size: 13px;
      margin-top: 16px;
    }

    .back-to-login a {
      color: var(--brand-primary);
      text-decoration: none;
      cursor: pointer;
    }

    .back-to-login a:hover {
      text-decoration: underline;
    }

    /* Logged In */
    #logged-in { display: none; }

    .user-info {
      background: var(--bg-light);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .user-label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .user-email {
      font-size: 15px;
      color: var(--text-primary);
      font-weight: 700;
      word-break: break-all;
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
      border: none;
      color: var(--text-on-brand);
    }

    .action-btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .action-btn.secondary {
      background: var(--bg-white);
      border: 1px solid var(--border-medium);
      color: var(--text-secondary);
    }

    .action-btn.secondary:hover {
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    .action-btn.danger {
      background: var(--bg-white);
      border: 1px solid rgba(231, 76, 60, 0.2);
      color: var(--accent-danger);
      font-size: 12px;
    }

    .action-btn.danger:hover {
      background: rgba(231, 76, 60, 0.05);
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <div class="popup-container">
    <div class="logo-section">
      <img class="logo-full" src="clippo_logo.svg" alt="Clippo"/>
    </div>

    <!-- Logged Out State -->
    <div id="logged-out">
      <button class="google-btn" id="google-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <div class="tabs">
        <button class="tab-btn active" id="login-tab">Login</button>
        <button class="tab-btn" id="signup-tab">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Your password" required>
        </div>
        <div class="forgot-link"><a id="forgot-link">Forgot password?</a></div>
        <button type="submit" class="submit-btn" id="login-btn">Login</button>
        <div class="message" id="login-message"></div>
      </form>

      <!-- Reset Password Form -->
      <form id="reset-form">
        <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 20px;">
          Enter your email and we'll send you a link to reset your password.
        </p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reset-email" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="submit-btn" id="reset-btn">Send Reset Link</button>
        <div class="message" id="reset-message"></div>
        <div class="back-to-login"><a id="back-to-login">Back to Login</a></div>
      </form>

      <!-- Signup Form -->
      <form id="signup-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="submit-btn" id="signup-btn">Create Account</button>
        <div class="message" id="signup-message"></div>
      </form>
    </div>

    <!-- Logged In State -->
    <div id="logged-in">
      <div class="user-info">
        <div class="user-label">Logged in as</div>
        <div class="user-email" id="user-email">user@example.com</div>
      </div>

      <button class="action-btn primary" id="open-archive-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        Open Archive
      </button>

      <button class="action-btn secondary" id="settings-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        Settings
      </button>

      <button class="action-btn danger" id="logout-btn">Logout</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
